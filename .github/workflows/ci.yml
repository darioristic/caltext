name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: |
          echo "SKIP=$SKIP_ENV_VALIDATION NODE_ENV=$NODE_ENV"
          cd packages/db
          bun -e 'console.log("proc SKIP:", JSON.stringify(process.env.SKIP_ENV_VALIDATION)); try { const m = await import("@caltext/shared"); console.log("enc:", typeof m.encryptContent); } catch (e) { console.log("IMPORT THROW:", e.message.slice(0, 90)); }'
          cd ../..
          bun --filter='*' test
        env:
          SKIP_ENV_VALIDATION: "true"

  # Self-hosted deploy: SSH to the server and run scripts/deploy.sh
  # (git pull → bun install → build libs+web+api → pm2 restart).
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.CALTEXT_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.CALTEXT_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.CALTEXT_DEPLOY_USER }}@${{ secrets.CALTEXT_DEPLOY_HOST }}" \
            'cd /home/darioristic/caltext && ./scripts/deploy.sh'
